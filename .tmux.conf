# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# Add space after session name in status bar
set -g status-left '[#{session_name}] '
set -g status-left-length 30

# Ctrl+F to open tmux-sessionizer (works even inside Claude Code)
bind -n C-f display-popup -E "tmux-sessionizer"

# Alt+q/w/e/r/t to switch windows 1-5 (no prefix needed)
# Creates missing windows up to the target number, then switches
bind -n M-q run-shell 'n=1; while [ "$(tmux list-windows -F "##I" | sort -n | tail -1)" -lt "$n" ] 2>/dev/null; do tmux new-window; done; tmux select-window -t "$n"'
bind -n M-w run-shell 'n=2; while [ "$(tmux list-windows -F "##I" | sort -n | tail -1)" -lt "$n" ] 2>/dev/null; do tmux new-window; done; tmux select-window -t "$n"'
bind -n M-e run-shell 'n=3; while [ "$(tmux list-windows -F "##I" | sort -n | tail -1)" -lt "$n" ] 2>/dev/null; do tmux new-window; done; tmux select-window -t "$n"'
bind -n M-r run-shell 'n=4; while [ "$(tmux list-windows -F "##I" | sort -n | tail -1)" -lt "$n" ] 2>/dev/null; do tmux new-window; done; tmux select-window -t "$n"'
bind -n M-t run-shell 'n=5; while [ "$(tmux list-windows -F "##I" | sort -n | tail -1)" -lt "$n" ] 2>/dev/null; do tmux new-window; done; tmux select-window -t "$n"'
